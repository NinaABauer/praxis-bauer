<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Privatärztliche Praxis für Psychotherapie Dr. med. Nina Bauer</title>
  <link href=https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400&display=swap rel="stylesheet"/>
  <style>
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      background-color: #F7F5F2;
      color: #2C2C2C;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    .card {
      background: #ffffff;
      max-width: 520px;
      width: 90%;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    }
 
    .photo-area {
      width: 100%;
      height: 280px;
      overflow: hidden;
      position: relative;
    }
 
    .photo-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
 
    /* Platzhalter falls kein Foto vorhanden */
    .photo-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #C8D8D0 0%, #A8BEBC 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: #4a6b65;
      letter-spacing: 0.1em;
    }
 
    .content {
      padding: 2.5rem 2.8rem 2.8rem;
    }
 
    .label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #7A9E96;
      margin-bottom: 0.4rem;
    }
 
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 2rem;
      line-height: 1.15;
      color: #1E1E1E;
      margin-bottom: 0.2rem;
    }
 
    .praxis-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      color: #5C5C5C;
      margin-bottom: 2rem;
      font-style: italic;
    }
 
    .divider {
      border: none;
      border-top: 1px solid #E5E0DA;
      margin-bottom: 1.8rem;
    }
 
    .info-block {
      margin-bottom: 1.2rem;
    }
 
    .info-block a {
      color: #2C2C2C;
      text-decoration: none;
      font-size: 0.9rem;
      line-height: 1.6;
    }
 
    .info-block a:hover {
      color: #7A9E96;
      text-decoration: underline;
    }
 
    .info-block p {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #2C2C2C;
    }
 
    .termin-badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.6rem 1.4rem;
      border: 1px solid #7A9E96;
      border-radius: 1px;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7A9E96;
    }
 
  </style>
</head>
<body>
 
  <div class="card">
 
    <!-- FOTO: Ersetzen Sie "foto.jpg" durch Ihren Dateinamen -->
    <div class="photo-area">
      <img src="foto.jpg" alt="Dr. med. Nina Bauer" onerror="this.parentElement.innerHTML='<div class=\'photo-placeholder\'>Foto folgt</div>'"/>
    </div>
 
    <div class="content">
 
      <div class="label">Privatärztliche Praxis für Psychotherapie</div>
 
      <!-- NAME -->
      <h1>Dr. med. Nina Bauer</h1>
 
      <!-- PRAXISNAME -->
      <p class="praxis-name">Privatärztliche Praxis für Psychotherapie Dr. med. Nina Bauer</p>
 
      <hr class="divider"/>
 
      <!-- ADRESSE -->
      <div class="info-block">
        <div class="label">Adresse</div>
        <p>Minoritenweg 25<br/>93047 Regensburg</p>
      </div>
 
      <!-- E-MAIL -->
      <div class="info-block">
        <div class="label">E-Mail</div>
        <a href=mailto:praxis.nina.bauer@gmx.net>praxis.nina.bauer@gmx.net</a>
      </div>
 
      <!-- TERMIN -->
      <div class="termin-badge">Termine nach Vereinbarung</div>
 
    </div>
  </div>
 
</body>
</html>
